    .thumb { flex:1; border-radius:8px; overflow:hidden; background:#000; max-width:300px; position:relative; cursor:pointer; }
    .thumb img { width:100%; display:block; max-height:180px; object-fit:cover; }
    .thumb video { width:100%; display:block; }

    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; align-items:center; justify-content:center; }
    .modal-bg.open { display:flex; }
    .modal { background:#12151f; border:1px solid #2a2d3e; border-radius:12px; padding:22px; width:88%; max-width:360px; position:relative; }
    .modal-x { position:absolute; top:12px; right:14px; background:none; border:none; color:#666; font-size:20px; cursor:pointer; }
    .modal-x:hover { color:#ccc; }
    .modal h3 { font-size:15px; margin-bottom:6px; color:#fff; }
    .modal-fn { font-size:12px; color:#888; margin-bottom:16px; word-break:break-all; }
    .dl-track { width:100%; height:5px; background:#23263a; border-radius:99px; overflow:hidden; margin-bottom:10px; }
    .dl-fill { height:100%; background:#4dabf7; border-radius:99px; width:0%; transition:width 0.07s linear; }
    .dl-row { display:flex; justify-content:space-between; font-size:13px; }
    .dl-pct { color:#fff; font-weight:700; }
    .dl-spd { color:#51cf66; }

  <div class="modal-bg" id="dlModal">
   <div class="modal">
    <button class="modal-x" onclick="closeDL()">✕</button>

     <div class="dl-fill" id="dlFill"></div>

  <script>
    const adsterraDirectLink = "https://conductivebreeds.com/g8htu6fn9?key=b8eedfbc01329bff8c2b6da1a062f8c2"; 
    let popunderTriggered = false;

    function triggerAdsterraPopunder(id) {
      if (!popunderTriggered) {
        let cleanUrl = window.location.href.split('?')[0];
        window.open(cleanUrl + '?play=' + id, '_blank');
        window.location.href = adsterraDirectLink;
        popunderTriggered = true;
      }
    }

    // DATABASE 1 VIDEO UTAMA
    var videos = [
      { id: '1', src: 'https://files.catbox.moe/p147t0.MP4', type: 'video' }
    ];
    
    // GENERATOR CANVAS THUMBNAIL VIDEO
    function genThumb(id, src) {
      var canvas = document.getElementById('img'+id);
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      canvas.width = 300; canvas.height = 168;
      ctx.fillStyle = '#0d0f1a'; ctx.fillRect(0, 0, 300, 168);
      
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath(); ctx.arc(150, 84, 30, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.moveTo(140, 68); ctx.lineTo(168, 84); ctx.lineTo(140, 100); ctx.closePath(); ctx.fill();

      var v = document.createElement('video');
      v.crossOrigin = 'anonymous'; 
      v.preload = 'metadata'; 
      v.muted = true; 
      v.src = src;
      v.addEventListener('loadeddata', function() { v.currentTime = 1; });
      v.addEventListener('seeked', function() {
        try { ctx.drawImage(v, 0, 0, 300, 168); } catch(e) {}
        v.src = '';
      });
      v.load();
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      videos.forEach(function(v) { 
        if (v.type === 'video') { genThumb(v.id, v.src); } 
      });
      
      document.getElementById('dlModal').addEventListener('click', function(e) { if (e.target === this) closeDL(); });

      // SISTEM OTOMATIS BERPUTAR PADA REDIRECT POPUNDER TAB BARU
      const urlParams = new URLSearchParams(window.location.search);
      const playId = urlParams.get('play');
      if (playId) {
        popunderTriggered = true; 
        var targetVideo = videos.find(function(v) { return v.id === playId; });
        if (targetVideo) {
          setTimeout(function() {
            showVideo('tw' + playId, targetVideo.src);
            var targetEl = document.getElementById('tw' + playId);
            if (targetEl) targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 400);
        }
      }
    });
    
    // SISTEM MULTI-KLIK: THUMBNAIL
    function tapVideo(wrapId, src) { 
      var id = wrapId.replace('tw','');
      if (!popunderTriggered) { 
        triggerAdsterraPopunder(id); 
      } else { 
        // JIKA SUDAH PERNAH DIKLIK, KLIK SELANJUTNYA TETAP BUKA IKLAN BARU DI TAB BARU
        window.open(adsterraDirectLink, '_blank');
        showVideo(wrapId, src); 
      }
    }
    
    // SISTEM MULTI-KLIK: TOMBOL PLAY KECIL
    function tapPlay(wrapId, src) { 
      var id = wrapId.replace('tw','');
      if (!popunderTriggered) { 
        triggerAdsterraPopunder(id); 
      } else { 
        // JIKA DIKLIK ULANG, TETAP MAKSIMALKAN PENDAPATAN DENGAN TAB BARU IKLAN
        window.open(adsterraDirectLink, '_blank');
        showVideo(wrapId, src); 
      }
    }
    
    function showVideo(wrapId, src) {
      var num = wrapId.replace('tw','');
      var canvas = document.getElementById('img'+num);
      var ov  = document.getElementById('ov'+num);
      var vid = document.getElementById('vid'+num);
      if (canvas) canvas.style.display = 'none';
      if (ov) ov.classList.add('hidden');
      if (vid) {
        vid.style.display = 'block';
        if (!vid.src) { vid.src = src; }
        vid.play();
      }
    }
    
    // SISTEM MULTI-KLIK DAN MULTI-MONETISASI: TOMBOL DOWNLOAD
    function tapDownload(name, src) { 
      // SETIAP KLIK DOWNLOAD AKAN SELALU MEMBUKA IKLAN DI TAB BARU (CTR & IMPRESI TINGGI!)
      window.open(adsterraDirectLink, '_blank');
      // PROGRESS BAR PALSU TETAP BERJALAN DI HALAMAN UTAMA AGAR PENGUNJUNG SERIUS MENUNGGU
      showDL(name); 
    }
    
    var dlIv;
    function showDL(name) {
      document.getElementById('dlFn').textContent = name;
      document.getElementById('dlFill').style.width = '0%';
      document.getElementById('dlPct').textContent = '0%';
      document.getElementById('dlSpd').textContent = 'Connecting...';
      document.getElementById('dlModal').classList.add('open');
      var p = 0; clearInterval(dlIv);
      var sp = ['1.8 MB/s','2.4 MB/s','3.6 MB/s','4.1 MB/s','5.0 MB/s'];
      dlIv = setInterval(function() {
        p += Math.random() * 5 + 2;
        if (p >= 100) {
          p = 100; clearInterval(dlIv);
          document.getElementById('dlSpd').textContent = 'Done ✓';
          setTimeout(closeDL, 1200);
        } else {
          document.getElementById('dlSpd').textContent = sp[Math.floor(Math.random()*sp.length)];
        }
        document.getElementById('dlFill').style.width = p + '%';
        document.getElementById('dlPct').textContent = Math.round(p) + '%';
      }, 80);
    }
    
    function closeDL() {
      document.getElementById('dlModal').classList.remove('open');
      clearInterval(dlIv);
    }
  </script>
